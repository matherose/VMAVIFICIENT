name: Build, Test & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Format check ──────────────────────────────────────────────────
  # Cheap, runs on a tiny ubuntu image; fails fast on style drift so we
  # don't waste 30 minutes of macOS time before noticing.
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin to a specific clang-format version. The unversioned package
      # tracks the distro default and shifts under our feet when the
      # runner image updates; pinning keeps the gate stable so a green
      # local run stays green in CI.
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: clang-format-18 --dry-run -Werror src/*.c include/*.h

<<<<<<< HEAD
  # ── Default build: macOS + Homebrew system deps ───────────────────
  # Verifies the recommended build path (VMAV_USE_SYSTEM_DEPS=ON, the
  # default since v1.1.0). Fast: only SVT-AV1-HDR, libhdr10plus, and
  # grav1synth build from source; everything else comes from Homebrew.
  build-macos-system:
    runs-on: macos-14
    timeout-minutes: 60
    needs: format-check

    steps:
      - uses: actions/checkout@v4

      - name: Install build + runtime deps via Homebrew
        run: |
          brew install \
            ninja pkg-config nasm \
            ffmpeg opus dovi_tool tesseract leptonica \
            jpeg-turbo libpng libtiff cjson openssl@3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-macos-arm64-${{ hashFiles('rust/**/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: cargo-macos-arm64-

      # The big win: cache build/deps so FFmpeg, SVT-AV1, Tesseract et al.
      # don't get rebuilt from scratch on every CI run. Keyed on
      # CMakeLists.txt because that's where every version pin lives —
      # bumping a dep invalidates the cache automatically.
      - name: Cache ExternalProject builds
        uses: actions/cache@v4
        with:
          path: build/deps
          key: cmake-deps-macos-arm64-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-macos-arm64-

      - name: Install cargo-c
        run: cargo install cargo-c

      - name: Configure (system deps)
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CROSSCOMPILING=ON \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Verify version banner
        run: ./build/vmavificient --help | head -1

      - name: Download test media (Big Buck Bunny 1080p)
        run: |
          curl -L -o bbb.mp4.zip \
            "https://download.blender.org/demo/movies/BBB/bbb_sunflower_1080p_30fps_normal.mp4.zip"
          unzip bbb.mp4.zip
          ffmpeg -y -ss 0 -t 5 -i bbb_sunflower_1080p_30fps_normal.mp4 \
            -c copy sample.mp4

      # 2000 kbps = the HD live-action clean tier floor; 500 kbps was below
      # any preset's target and didn't really exercise the rate-control path.
      # Still a smoke test, not a quality gate.
      - name: Test encode
        run: ./build/vmavificient --blind --bitrate 2000 sample.mp4
        timeout-minutes: 15

      - name: Verify output
        run: |
          OUTPUT=$(ls -1 *.mkv 2>/dev/null | head -1)
          [ -n "$OUTPUT" ] || { echo "::error::no MKV produced"; exit 1; }
          echo "Output: $OUTPUT ($(du -h "$OUTPUT" | cut -f1))"

  # Linux CI is deferred until the dep surface is in a stable distro
  # most users actually run (libdovi-dev only landed in Debian trixie /
  # Ubuntu 25.04+). When we revisit, mirror build-macos-system on
  # ubuntu-latest with apt-installed -dev packages.

  # ── Sanitizer build (ASAN/UBSAN) ──────────────────────────────────
  # Uses vendored mode so the sanitizer interposes our static archives
  # cleanly without bumping into Homebrew's signed dynamic libs.
  sanitizer:
    runs-on: macos-14
    timeout-minutes: 120
    needs: format-check

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install ninja pkg-config nasm ffmpeg

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-macos-arm64-${{ hashFiles('rust/**/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: cargo-macos-arm64-

      - name: Cache ExternalProject builds
        uses: actions/cache@v4
        with:
          path: build-asan/deps
          key: cmake-deps-asan-macos-arm64-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-asan-macos-arm64-

      - name: Install cargo-c
        run: cargo install cargo-c

      - name: Configure (sanitizer + vendored)
        run: |
          cmake -G Ninja -B build-asan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CROSSCOMPILING=ON \
            -DVMAV_USE_SYSTEM_DEPS=OFF \
            -DVMAV_SANITIZE=ON

      - name: Build (sanitizer)
        run: cmake --build build-asan -j$(sysctl -n hw.ncpu)

      - name: Download test media
        run: |
          curl -L -o bbb.mp4.zip \
            "https://download.blender.org/demo/movies/BBB/bbb_sunflower_1080p_30fps_normal.mp4.zip"
          unzip bbb.mp4.zip
          ffmpeg -y -ss 0 -t 5 -i bbb_sunflower_1080p_30fps_normal.mp4 \
            -c copy sample.mp4

      # ASAN_OPTIONS=halt_on_error=1 so a single bad access fails CI loud.
      # detect_leaks=0 because libdovi/libhdr10plus's Rust runtime hangs
      # on tiny static allocations the loader doesn't reclaim — false
      # positives, not real leaks.
      - name: Test encode (sanitizer)
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ./build-asan/vmavificient --blind --bitrate 2000 sample.mp4
        timeout-minutes: 30

  # ── Static binary build (tag-only, for the GitHub release) ────────
  # Vendored mode: every dep statically linked into a single file users
  # can `chmod +x` and run without installing anything else. Slow build
  # so we only do this when cutting a release.
  build-static:
    runs-on: macos-14
    timeout-minutes: 120
    needs: format-check
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: brew install ninja pkg-config nasm ffmpeg

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-macos-arm64-${{ hashFiles('rust/**/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: cargo-macos-arm64-

      # The big win: cache build/deps so FFmpeg, SVT-AV1, Tesseract et al.
      # don't get rebuilt from scratch on every release run. Keyed on
      # CMakeLists.txt so a dep version bump invalidates automatically.
      - name: Cache ExternalProject builds
        uses: actions/cache@v4
        with:
          path: build/deps
          key: cmake-deps-static-macos-arm64-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-static-macos-arm64-

      - name: Install cargo-c
        run: cargo install cargo-c

      - name: Configure (vendored static)
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CROSSCOMPILING=ON \
            -DVMAV_USE_SYSTEM_DEPS=OFF

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/vmavificient dist/vmavificient-macos-arm64
          chmod +x dist/vmavificient-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmavificient-macos-arm64
          path: dist/vmavificient-macos-arm64

  # ── Release (on tag push) ─────────────────────────────────────────
  release:
    needs: [build-macos-system, sanitizer, build-static]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # SHA256SUMS lives next to the binary in the GitHub release so
      # downloaders can verify integrity with a single `shasum -c`.
      - name: Generate checksums
        run: |
          cd artifacts
          shasum -a 256 * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
