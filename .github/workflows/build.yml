name: Build, Test & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      # ── Dependencies ──────────────────────────────────────────────
      # Build-tool-only installs. All runtime libraries (tesseract, leptonica,
      # curl, openssl, zlib, ...) are built from source by CMake and linked
      # statically so the final binary has no dependency on brew/apt packages.
      - name: Install dependencies
        run: |
          brew install ninja pkg-config nasm ffmpeg

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-macos-arm64-${{ hashFiles('rust/**/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: cargo-macos-arm64-

      - name: Install cargo-c
        run: cargo install cargo-c

      # ── Build ─────────────────────────────────────────────────────
      - name: Configure
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CROSSCOMPILING=ON

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Verify binary
        run: ./build/vmavificient --help

      # ── Test ──────────────────────────────────────────────────────
      - name: Download test media (Big Buck Bunny 1080p)
        run: |
          curl -L -o bbb.mp4.zip \
            "https://download.blender.org/demo/movies/BBB/bbb_sunflower_1080p_30fps_normal.mp4.zip"
          unzip bbb.mp4.zip
          ls -lh bbb_sunflower_1080p_30fps_normal.mp4

      - name: Extract 5-second sample
        run: |
          ffmpeg -y -ss 0 -t 5 -i bbb_sunflower_1080p_30fps_normal.mp4 \
            -c copy sample.mp4
          ls -lh sample.mp4

      - name: Test encode
        run: |
          ./build/vmavificient --blind --bitrate 500 sample.mp4
        timeout-minutes: 15

      - name: Verify output
        run: |
          OUTPUT=$(ls -1 *.mkv 2>/dev/null | head -1)
          if [ -z "$OUTPUT" ]; then
            echo "::error::No MKV output file produced"
            exit 1
          fi
          echo "Output: $OUTPUT ($(du -h "$OUTPUT" | cut -f1))"

      # ── Package ───────────────────────────────────────────────────
      - name: Package binary
        run: |
          mkdir -p dist
          cp build/vmavificient dist/vmavificient-macos-arm64
          chmod +x dist/vmavificient-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmavificient-macos-arm64
          path: dist/vmavificient-macos-arm64

  # ── Release (on tag push) ───────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
