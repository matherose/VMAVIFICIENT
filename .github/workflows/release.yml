name: Release — Package + Publish

# Tag-triggered packaging pipeline. Pushes to refs/tags/v* fire this
# workflow; ordinary commit pushes are unaffected (ci.yml handles
# those). Each arch builds vmavificient + the bundled tessdata, then
# runs the matching packaging script. A final job collects every
# artifact and creates a GitHub Release.
#
# Sequence per arch (build → package → upload):
#   linux-x86_64   .tar.zst + .deb
#   linux-aarch64  .tar.zst + .deb
#   macos-arm64    .tar.zst + .pkg
#   windows-x86_64 .tar.zst + .msi
#
# Reproducibility: each build job calls scripts/repro_check.sh (strong
# mode) so the binary's sha256 is identical across two clean builds
# with the same SOURCE_DATE_EPOCH (defaulted to the VERSION file mtime
# at the commit being tagged). Packaging is deterministic except for
# .pkg (macOS pkgbuild has no SOURCE_DATE_EPOCH equivalent — see m4
# commit). The contained binary stays the trust anchor.

on:
  push:
    tags:
      - 'v*'

# Don't cancel an in-progress release run if a second tag lands. Each
# tag is a distinct release artifact.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # required to create the GH Release

jobs:
  # ================================================================
  # Linux x86_64 — .tar.zst + .deb
  # ================================================================
  package-linux-x86_64:
    name: package / linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install build deps + ffmpeg + zstd
        run: |
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo apt-get install -y --no-install-recommends \
              clang-20 lld-20 llvm-20 nasm pkg-config meson ninja-build \
              ffmpeg zstd dpkg-dev
      - name: Add Rust gnu target
        run: rustup target add x86_64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Configure (release packaging)
        run: |
          cmake --preset linux-x86_64 \
              -DVMAV_BUNDLE_TESSDATA=ON \
              -DVMAV_FETCH_REAL_CONTENT=OFF
      - name: Build (strong-mode reproducibility check)
        run: scripts/repro_check.sh --preset linux-x86_64
      - name: Build packaged tree (incremental on round-b output)
        run: cmake --build --preset linux-x86_64
      - name: Build .tar.zst
        run: packaging/tarball/build_tarball.sh
              --build-dir build/linux-x86_64
              --triple    linux-x86_64
              --out-dir   dist/
      - name: Build .deb
        run: packaging/deb/build_deb.sh
              --build-dir build/linux-x86_64
              --triple    linux-x86_64
              --out-dir   dist/
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-x86_64
          path: |
            dist/vmavificient-*-linux-x86_64.tar.zst
            dist/vmavificient_*_amd64.deb
          retention-days: 14
          if-no-files-found: error

  # ================================================================
  # Linux aarch64 — .tar.zst + .deb
  # ================================================================
  package-linux-aarch64:
    name: package / linux-aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install build deps + ffmpeg + zstd
        run: |
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo apt-get install -y --no-install-recommends \
              clang-20 lld-20 llvm-20 pkg-config meson ninja-build \
              ffmpeg zstd dpkg-dev
      - name: Add Rust gnu target
        run: rustup target add aarch64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Configure (release packaging)
        run: |
          cmake --preset linux-aarch64 \
              -DVMAV_BUNDLE_TESSDATA=ON \
              -DVMAV_FETCH_REAL_CONTENT=OFF
      - name: Build (strong-mode reproducibility check)
        run: scripts/repro_check.sh --preset linux-aarch64
      - name: Build packaged tree (incremental on round-b output)
        run: cmake --build --preset linux-aarch64
      - name: Build .tar.zst
        run: packaging/tarball/build_tarball.sh
              --build-dir build/linux-aarch64
              --triple    linux-aarch64
              --out-dir   dist/
      - name: Build .deb
        run: packaging/deb/build_deb.sh
              --build-dir build/linux-aarch64
              --triple    linux-aarch64
              --out-dir   dist/
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-aarch64
          path: |
            dist/vmavificient-*-linux-aarch64.tar.zst
            dist/vmavificient_*_arm64.deb
          retention-days: 14
          if-no-files-found: error

  # ================================================================
  # macOS arm64 — .tar.zst + .pkg
  # ================================================================
  package-macos-arm64:
    name: package / macos-arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install build deps + ffmpeg + zstd + gnu-tar
        run: brew install meson nasm ffmpeg zstd gnu-tar
      - name: Add Rust aarch64-apple-darwin target
        run: rustup target add aarch64-apple-darwin
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Configure (release packaging)
        run: |
          cmake --preset macos-arm64 \
              -DVMAV_BUNDLE_TESSDATA=ON \
              -DVMAV_FETCH_REAL_CONTENT=OFF
      - name: Build (strong-mode reproducibility check)
        run: scripts/repro_check.sh --preset macos-arm64
      - name: Build packaged tree (incremental on round-b output)
        run: cmake --build --preset macos-arm64
      - name: Build .tar.zst
        run: packaging/tarball/build_tarball.sh
              --build-dir build/macos-arm64
              --triple    macos-arm64
              --out-dir   dist/
      - name: Build .pkg
        run: packaging/pkg/build_pkg.sh
              --build-dir build/macos-arm64
              --triple    macos-arm64
              --out-dir   dist/
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: |
            dist/vmavificient-*-macos-arm64.tar.zst
            dist/vmavificient-*-macos-arm64.pkg
          retention-days: 14
          if-no-files-found: error

  # ================================================================
  # Windows x86_64 (mingw cross from Linux) — .tar.zst + .msi
  # ================================================================
  package-windows-x86_64:
    name: package / windows-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install build deps + ffmpeg + zstd + dotnet
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              nasm pkg-config meson ninja-build \
              ffmpeg zstd \
              dotnet-sdk-8.0
      - name: Install WiX v4 CLI
        run: |
          dotnet tool install --global wix
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Fetch llvm-mingw
        run: |
          dir="$(bash scripts/fetch_llvm_mingw.sh | tail -n 1)"
          echo "${dir}/bin" >> "$GITHUB_PATH"
      - name: Add Rust windows-gnu target
        run: rustup target add x86_64-pc-windows-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Point cargo at llvm-mingw's linker
        run: |
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
          echo "CC_x86_64_pc_windows_gnu=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
      - name: Configure (release packaging)
        run: |
          cmake --preset windows-x86_64-mingw \
              -DVMAV_BUNDLE_TESSDATA=ON \
              -DVMAV_FETCH_REAL_CONTENT=OFF
      - name: Build (strong-mode reproducibility check)
        run: scripts/repro_check.sh --preset windows-x86_64-mingw
      - name: Build packaged tree (incremental on round-b output)
        run: cmake --build --preset windows-x86_64-mingw
      - name: Build .tar.zst
        run: packaging/tarball/build_tarball.sh
              --build-dir build/windows-x86_64-mingw
              --triple    windows-x86_64-mingw
              --out-dir   dist/
      - name: Build .msi
        run: packaging/msi/build_msi.sh
              --build-dir build/windows-x86_64-mingw
              --triple    windows-x86_64-mingw
              --out-dir   dist/
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86_64
          path: |
            dist/vmavificient-*-windows-x86_64-mingw.tar.zst
            dist/vmavificient-*-windows-x86_64.msi
          retention-days: 14
          if-no-files-found: error

  # ================================================================
  # Final job — collect everything + create the GH Release.
  # ================================================================
  publish:
    name: publish GitHub Release
    needs:
      - package-linux-x86_64
      - package-linux-aarch64
      - package-macos-arm64
      - package-windows-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # for autogenerated release notes
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: List collected artifacts
        run: ls -la dist/
      - name: Create GitHub Release
        # Tag name surfaced via env: rather than directly interpolated
        # into the run script — defense in depth against any future
        # tag-name validation surprise. github.ref_name is auto-set by
        # GitHub Actions to the bare tag (no refs/tags/ prefix).
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # `--generate-notes` autogenerates from PRs/commits since the
          # previous tag, server-side. `--draft` so a human reviews the
          # release before users see it.
          gh release create "$TAG" \
              --title "vmavificient $TAG" \
              --generate-notes \
              --draft \
              dist/*
