name: CI — Quality Gates Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# ──────────────────────────────────────────────────────────────────────────────
# Linux-portable gates only (clang-format). The build / test / static analysis
# / sanitizer / coverage gates are macOS-only because the project's runtime
# deps (libdovi, libhdr10plus, SVT-AV1-HDR) aren't packaged in a Linux distro
# most users actually run yet — libdovi-dev only landed in Debian trixie /
# Ubuntu 25.04+. Those gates live in build.yml on macos-14. Re-introduce
# ubuntu-latest jobs here when the Linux dep surface lands.
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          clang-format-18 --dry-run --Werror -style=file \
            $(find src include -name "*.c" -o -name "*.h")
