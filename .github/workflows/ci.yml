name: CI

# Pipeline shape (top-to-bottom):
#
#   format-check
#         |
#         v
#   config (detects build mode: fast vs strong)
#         |
#         +-----------+-----------+-----------+
#         v           v           v           v
#   build / lx86  build / la64  build / mac  build / win
#         |           |           |           |
#         v           v           v           v
#   test  / lx86  test  / la64  test  / mac  test  / win
#
# Build mode (decided by `config` job):
#   * STRONG  — push to main, push to tags v*:
#               full from-scratch per-arch repro (2 clean rounds,
#               sha256 compare). No cache. Release-grade validation.
#   * FAST    — feat/** pushes, PRs, nightly cron, workflow_dispatch:
#               single cached build per arch. Reproducible by virtue
#               of SOURCE_DATE_EPOCH + the determinism flags from
#               VmavReproducible.cmake, but not proven on this push.
#
# The flags that make every artifact reproducible-by-construction
# (SOURCE_DATE_EPOCH, prefix-maps, --build-id=none, --sort-section=name)
# are always on. STRONG mode *proves* it by double-building; FAST mode
# trusts it. A non-deterministic change first lands in feat/** (no
# proof), gets merged to main (proof runs), and if it broke the gate
# it's reverted before any tag is cut — so no broken release ships.
#
# Build → test handoff: the build job uploads
#   build/<preset>/{CTestTestfile.cmake, tests/, src/vmavificient}
# (CMakeFiles object dirs excluded) as an artifact named
# `ci-build-<arch>`. The test job downloads that artifact in place
# under the same $GITHUB_WORKSPACE-relative path so CTestTestfile.cmake's
# absolute paths still resolve. GH Actions guarantees the same workspace
# path across jobs within one run on the same OS family.

on:
  push:
    branches: [main, "feat/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    # Daily nightly run against the latest main at 03:00 UTC. Catches
    # external drift (apt repo updates, runner image changes) that a
    # quiet day with no pushes would otherwise hide.
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ================================================================
  # Stage 1 — Source hygiene
  # ================================================================
  format-check:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install clang-format-18.1.8 (pinned, matches local dev toolchain)
        run: |
          python3 -m pip install --user --quiet 'clang-format==18.1.8'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Show clang-format version
        run: clang-format --version
      - name: Check formatting
        run: |
          mapfile -t files < <(git ls-files '*.c' '*.h')
          if [ ${#files[@]} -eq 0 ]; then
              echo "No C sources to check (skeleton — expected)."
              exit 0
          fi
          clang-format --dry-run --Werror "${files[@]}"

  # ================================================================
  # Stage 2 — Decide build mode (fast vs strong)
  # ================================================================
  config:
    name: config (decide build mode)
    needs: format-check
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
    steps:
      - id: detect
        run: |
          # STRONG mode (full from-scratch per-arch repro) only on:
          #   * push to refs/heads/main
          #   * push to refs/tags/v*
          # Everything else (feat/** push, PR, schedule, manual) → FAST.
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
              if [[ "$GITHUB_REF" == "refs/heads/main" ]] || [[ "$GITHUB_REF" == refs/tags/v* ]]; then
                  mode=strong
              else
                  mode=fast
              fi
          else
              mode=fast
          fi
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"
          echo "::notice title=CI build mode::${mode} (event=${GITHUB_EVENT_NAME} ref=${GITHUB_REF})"

  # ================================================================
  # Stage 3 — Per-arch builds (parallel within stage)
  # ================================================================
  build-linux-x86_64:
    name: build / linux-x86_64
    needs: config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install clang-20 + lld-20 + nasm + pkg-config + meson + diffoscope
        run: |
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo apt-get install -y --no-install-recommends \
              clang-20 lld-20 llvm-20 nasm pkg-config meson ninja-build diffoscope
      - name: Add Rust gnu target
        run: rustup target add x86_64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      # FAST path: restore third-party cache + single cached build.
      - name: Capture submodule SHAs (cache key input)
        if: needs.config.outputs.mode == 'fast'
        run: git submodule status --recursive | awk '{print $1}' > .vmav-tp-shas
      - name: Cache vendored third-party install + ExternalProject stamps
        if: needs.config.outputs.mode == 'fast'
        uses: actions/cache@v4
        with:
          path: |
            build/linux-x86_64/third_party_install
            build/linux-x86_64/*-prefix
          # Invalidate on submodule bumps OR on changes to how we build
          # third-party (VmavThirdParty.cmake) or how we target this arch
          # (toolchain file). No `restore-keys:` on purpose — a partial
          # match would leave stale ExternalProject stamps that claim
          # deps are built when they aren't, producing link errors.
          key: vmav-tp-linux-x86_64-${{ hashFiles('.vmav-tp-shas', 'cmake/modules/VmavThirdParty.cmake', 'cmake/toolchains/linux-x86_64.cmake') }}
      - name: Configure (fast mode)
        if: needs.config.outputs.mode == 'fast'
        run: cmake --preset linux-x86_64
      - name: Build (fast mode)
        if: needs.config.outputs.mode == 'fast'
        run: cmake --build --preset linux-x86_64
      # STRONG path: full from-scratch repro (rebuilds deps + project
      # twice from clean and sha256-compares), then incrementally
      # builds test binaries on top of round-b's tree.
      - name: Reproducible build (strong mode — full from-scratch)
        if: needs.config.outputs.mode == 'strong'
        run: scripts/repro_check.sh --preset linux-x86_64
      - name: Build test binaries on top (strong mode)
        if: needs.config.outputs.mode == 'strong'
        run: cmake --build --preset linux-x86_64
      - name: Sanity (ELF + version)
        run: |
          file build/linux-x86_64/src/vmavificient
          build/linux-x86_64/src/vmavificient version
      - uses: actions/upload-artifact@v4
        with:
          name: ci-build-linux-x86_64
          path: |
            build/linux-x86_64/CTestTestfile.cmake
            build/linux-x86_64/tests/**
            build/linux-x86_64/src/vmavificient
            !build/linux-x86_64/**/CMakeFiles/**
          retention-days: 1
          if-no-files-found: error

  build-linux-aarch64:
    name: build / linux-aarch64
    needs: config
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install clang-20 + lld-20 + pkg-config + meson + diffoscope
        run: |
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo apt-get install -y --no-install-recommends \
              clang-20 lld-20 llvm-20 pkg-config meson ninja-build diffoscope
      - name: Add Rust gnu target
        run: rustup target add aarch64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Capture submodule SHAs (cache key input)
        if: needs.config.outputs.mode == 'fast'
        run: git submodule status --recursive | awk '{print $1}' > .vmav-tp-shas
      - name: Cache vendored third-party install + ExternalProject stamps
        if: needs.config.outputs.mode == 'fast'
        uses: actions/cache@v4
        with:
          path: |
            build/linux-aarch64/third_party_install
            build/linux-aarch64/*-prefix
          key: vmav-tp-linux-aarch64-${{ hashFiles('.vmav-tp-shas', 'cmake/modules/VmavThirdParty.cmake', 'cmake/toolchains/linux-aarch64.cmake') }}
      - name: Configure (fast mode)
        if: needs.config.outputs.mode == 'fast'
        run: cmake --preset linux-aarch64
      - name: Build (fast mode)
        if: needs.config.outputs.mode == 'fast'
        run: cmake --build --preset linux-aarch64
      - name: Reproducible build (strong mode — full from-scratch)
        if: needs.config.outputs.mode == 'strong'
        run: scripts/repro_check.sh --preset linux-aarch64
      - name: Build test binaries on top (strong mode)
        if: needs.config.outputs.mode == 'strong'
        run: cmake --build --preset linux-aarch64
      - name: Sanity (ELF + version)
        run: |
          file build/linux-aarch64/src/vmavificient
          build/linux-aarch64/src/vmavificient version
      - uses: actions/upload-artifact@v4
        with:
          name: ci-build-linux-aarch64
          path: |
            build/linux-aarch64/CTestTestfile.cmake
            build/linux-aarch64/tests/**
            build/linux-aarch64/src/vmavificient
            !build/linux-aarch64/**/CMakeFiles/**
          retention-days: 1
          if-no-files-found: error

  build-macos-arm64:
    name: build / macos-arm64
    needs: config
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install meson + nasm + diffoscope via Homebrew
        run: brew install meson nasm diffoscope
      - name: Add Rust aarch64-apple-darwin target (host triple)
        run: rustup target add aarch64-apple-darwin
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Capture submodule SHAs (cache key input)
        if: needs.config.outputs.mode == 'fast'
        run: git submodule status --recursive | awk '{print $1}' > .vmav-tp-shas
      - name: Cache vendored third-party install + ExternalProject stamps
        if: needs.config.outputs.mode == 'fast'
        uses: actions/cache@v4
        with:
          path: |
            build/macos-arm64/third_party_install
            build/macos-arm64/*-prefix
          key: vmav-tp-macos-arm64-${{ hashFiles('.vmav-tp-shas', 'cmake/modules/VmavThirdParty.cmake', 'cmake/toolchains/macos-arm64.cmake') }}
      - name: Configure (fast mode)
        if: needs.config.outputs.mode == 'fast'
        run: cmake --preset macos-arm64
      - name: Build (fast mode)
        if: needs.config.outputs.mode == 'fast'
        run: cmake --build --preset macos-arm64
      - name: Reproducible build (strong mode — full from-scratch)
        if: needs.config.outputs.mode == 'strong'
        run: scripts/repro_check.sh --preset macos-arm64
      - name: Build test binaries on top (strong mode)
        if: needs.config.outputs.mode == 'strong'
        run: cmake --build --preset macos-arm64
      - name: Sanity (Mach-O + version)
        run: |
          file build/macos-arm64/src/vmavificient
          build/macos-arm64/src/vmavificient version
      - uses: actions/upload-artifact@v4
        with:
          name: ci-build-macos-arm64
          path: |
            build/macos-arm64/CTestTestfile.cmake
            build/macos-arm64/tests/**
            build/macos-arm64/src/vmavificient
            !build/macos-arm64/**/CMakeFiles/**
          retention-days: 1
          if-no-files-found: error

  build-windows-x86_64-mingw:
    name: build / windows-x86_64-mingw
    needs: config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install wine + nasm + pkg-config + meson + diffoscope
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              wine nasm pkg-config meson ninja-build diffoscope
          command -v wine
          wine --version
      - name: Fetch llvm-mingw
        run: |
          dir="$(bash scripts/fetch_llvm_mingw.sh | tail -n 1)"
          echo "${dir}/bin" >> "$GITHUB_PATH"
      - name: Add Rust windows-gnu target
        run: rustup target add x86_64-pc-windows-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Point cargo at llvm-mingw's linker (windows-gnu cross)
        run: |
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
          echo "CC_x86_64_pc_windows_gnu=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
      - name: Capture submodule SHAs (cache key input)
        if: needs.config.outputs.mode == 'fast'
        run: git submodule status --recursive | awk '{print $1}' > .vmav-tp-shas
      - name: Cache vendored third-party install + ExternalProject stamps
        if: needs.config.outputs.mode == 'fast'
        uses: actions/cache@v4
        with:
          path: |
            build/windows-x86_64-mingw/third_party_install
            build/windows-x86_64-mingw/*-prefix
          key: vmav-tp-windows-x86_64-mingw-${{ hashFiles('.vmav-tp-shas', 'cmake/modules/VmavThirdParty.cmake', 'cmake/toolchains/windows-x86_64-mingw.cmake') }}
      - name: Configure (fast mode)
        if: needs.config.outputs.mode == 'fast'
        run: cmake --preset windows-x86_64-mingw
      - name: Build (fast mode)
        if: needs.config.outputs.mode == 'fast'
        run: cmake --build --preset windows-x86_64-mingw
      - name: Reproducible build (strong mode — full from-scratch)
        if: needs.config.outputs.mode == 'strong'
        run: scripts/repro_check.sh --preset windows-x86_64-mingw
      - name: Build test binaries on top (strong mode)
        if: needs.config.outputs.mode == 'strong'
        run: cmake --build --preset windows-x86_64-mingw
      - name: Sanity (PE)
        run: |
          file build/windows-x86_64-mingw/src/vmavificient.exe
          test -s build/windows-x86_64-mingw/src/vmavificient.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ci-build-windows-x86_64-mingw
          path: |
            build/windows-x86_64-mingw/CTestTestfile.cmake
            build/windows-x86_64-mingw/tests/**
            build/windows-x86_64-mingw/src/vmavificient.exe
            !build/windows-x86_64-mingw/**/CMakeFiles/**
          retention-days: 1
          if-no-files-found: error

  # ================================================================
  # Stage 4 — Per-arch tests (each depends on its build)
  # ================================================================
  test-linux-x86_64:
    name: test / linux-x86_64
    needs: build-linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - uses: actions/download-artifact@v4
        with:
          name: ci-build-linux-x86_64
          path: build/linux-x86_64
      - name: Test
        run: ctest --test-dir build/linux-x86_64 --output-on-failure

  test-linux-aarch64:
    name: test / linux-aarch64
    needs: build-linux-aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - uses: actions/download-artifact@v4
        with:
          name: ci-build-linux-aarch64
          path: build/linux-aarch64
      - name: Test
        run: ctest --test-dir build/linux-aarch64 --output-on-failure

  test-macos-arm64:
    name: test / macos-arm64
    needs: build-macos-arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - uses: actions/download-artifact@v4
        with:
          name: ci-build-macos-arm64
          path: build/macos-arm64
      - name: Test
        run: ctest --test-dir build/macos-arm64 --output-on-failure

  test-windows-x86_64-mingw:
    name: test / windows-x86_64-mingw
    needs: build-windows-x86_64-mingw
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install wine (test runner is non-Windows host)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends wine
      - uses: actions/download-artifact@v4
        with:
          name: ci-build-windows-x86_64-mingw
          path: build/windows-x86_64-mingw
      - name: Test (under wine)
        env:
          WINEDEBUG: -all
        run: ctest --test-dir build/windows-x86_64-mingw --output-on-failure
