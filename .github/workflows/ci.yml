name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  format-check:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install clang-format-18.1.8 (pinned, matches local dev toolchain)
        run: |
          python3 -m pip install --user --quiet 'clang-format==18.1.8'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Show clang-format version
        run: clang-format --version
      - name: Check formatting
        run: |
          mapfile -t files < <(git ls-files '*.c' '*.h')
          if [ ${#files[@]} -eq 0 ]; then
              echo "No C sources to check (Phase 0 skeleton — expected)."
              exit 0
          fi
          clang-format --dry-run --Werror "${files[@]}"

  build-linux-x86_64:
    name: build / linux-x86_64 (native, glibc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install clang-20 + lld-20 + nasm + pkg-config + meson
        run: |
          # apt's default is clang-18 on 24.04; we pin clang-20 from the
          # official LLVM apt repo for newer assembler + intrinsics
          # coverage that SVT-AV1 needs. meson + ninja are libvmaf's
          # build system.
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo apt-get install -y --no-install-recommends \
              clang-20 lld-20 llvm-20 nasm pkg-config meson ninja-build
      - name: Add Rust gnu target (for libdovi/libhdr10plus cargo-c builds)
        run: rustup target add x86_64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Configure
        run: cmake --preset linux-x86_64
      - name: Build
        run: cmake --build --preset linux-x86_64 --verbose
      - name: Sanity
        run: |
          file build/linux-x86_64/src/vmavificient
          build/linux-x86_64/src/vmavificient version
      - name: Test
        run: ctest --test-dir build/linux-x86_64 --output-on-failure

  build-linux-aarch64:
    name: build / linux-aarch64 (native, glibc)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install clang-20 + lld-20 + pkg-config + meson
        run: |
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo apt-get install -y --no-install-recommends \
              clang-20 lld-20 llvm-20 pkg-config meson ninja-build
      - name: Add Rust gnu target
        run: rustup target add aarch64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Configure
        run: cmake --preset linux-aarch64
      - name: Build
        run: cmake --build --preset linux-aarch64 --verbose
      - name: Sanity
        run: |
          file build/linux-aarch64/src/vmavificient
          build/linux-aarch64/src/vmavificient version
      - name: Test
        run: ctest --test-dir build/linux-aarch64 --output-on-failure

  # Intel Mac runners (macos-13) are increasingly scarce on GHA as Apple
  # winds down x86 hardware; the macos-x86_64 job was queue-cancelled
  # on every run. The toolchain file + preset remain available for local
  # builds (cmake --preset macos-x86_64). If we ever need x86 Mac coverage
  # again, reintroduce a nightly-only job here.

  build-macos-arm64:
    name: build / macos-arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install meson + nasm via Homebrew (for libvmaf + SVT-AV1)
        run: |
          # macos-14 runner ships ninja but not meson; nasm not on the
          # default image either.
          brew install meson nasm
      - name: Add Rust aarch64-apple-darwin target (host triple)
        run: rustup target add aarch64-apple-darwin
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Configure
        run: cmake --preset macos-arm64
      - name: Build
        run: cmake --build --preset macos-arm64 --verbose
      - name: Sanity
        run: |
          file build/macos-arm64/src/vmavificient
          build/macos-arm64/src/vmavificient version
      - name: Test
        run: ctest --test-dir build/macos-arm64 --output-on-failure

  build-windows-x86_64-mingw:
    name: build / windows-x86_64-mingw (cross from Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install wine + nasm + pkg-config + meson
        run: |
          sudo apt-get update -qq
          # Ubuntu's `wine` package provides the /usr/bin/wine launcher
          # and recommends wine64 for x86_64 binaries. We use the launcher
          # because Ubuntu 24.04's standalone `wine64` doesn't ship
          # /usr/bin/wine64 — it lives in /usr/lib/wine/ and isn't on
          # PATH by default.
          # nasm is needed for SVT-AV1-HDR's x86 ASM (cross-compile from
          # linux to windows still runs nasm on the build host).
          # pkg-config + meson + ninja for libvmaf cross-build.
          sudo apt-get install -y --no-install-recommends \
              wine nasm pkg-config meson ninja-build
          command -v wine
          wine --version
      - name: Fetch llvm-mingw
        run: |
          dir="$(bash scripts/fetch_llvm_mingw.sh | tail -n 1)"
          echo "${dir}/bin" >> "$GITHUB_PATH"
      - name: Add Rust windows-gnu target
        run: rustup target add x86_64-pc-windows-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Point cargo at llvm-mingw's linker (windows-gnu cross)
        run: |
          # llvm-mingw provides x86_64-w64-mingw32-gcc/clang on PATH from
          # the previous step. Rust's windows-gnu target invokes the
          # linker through `cc`; nudging CARGO_TARGET_..._LINKER avoids
          # rustc defaulting to host gcc and emitting ELF objects.
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
          echo "CC_x86_64_pc_windows_gnu=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
      - name: Configure
        run: cmake --preset windows-x86_64-mingw
      - name: Build
        run: cmake --build --preset windows-x86_64-mingw --verbose
      - name: Sanity (PE check)
        run: |
          file build/windows-x86_64-mingw/src/vmavificient.exe
          test -s build/windows-x86_64-mingw/src/vmavificient.exe
      - name: Test (under wine)
        env:
          WINEDEBUG: -all
        run: ctest --test-dir build/windows-x86_64-mingw --output-on-failure
