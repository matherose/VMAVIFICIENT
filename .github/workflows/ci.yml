name: CI

# Pipeline shape (top-to-bottom):
#
#   format-check
#         |
#         v
#   repro-check / linux-x86_64
#         |
#         +---------------+----------------+----------------+
#         v               v                v                v
#   build / linux-x86  build / linux-arm  build / macos   build / win-mingw
#         |               |                |                |
#         v               v                v                v
#   test / linux-x86   test / linux-arm   test / macos    test / win-mingw
#
# Stage gating uses `needs:` so a failure short-circuits everything
# downstream — bad formatting never burns 30 min of repro+build cycles,
# and a broken build never wastes time uploading a useless artifact to
# its sibling test job.
#
# Build → test handoff: the build job uploads
#   build/<preset>/{CTestTestfile.cmake, tests/, src/vmavificient}
# (CMakeFiles object dirs excluded) as an artifact named
# `ci-build-<arch>`. The test job downloads that artifact in place and
# runs `ctest --test-dir build/<preset>`. Since CTestTestfile.cmake
# entries are absolute paths anchored at $GITHUB_WORKSPACE, the test
# job must check out the same SHA and unpack the artifact under the
# same workspace path — GH Actions guarantees this within a single
# workflow run.

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ================================================================
  # Stage 1 — Source hygiene
  # ================================================================
  format-check:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install clang-format-18.1.8 (pinned, matches local dev toolchain)
        run: |
          python3 -m pip install --user --quiet 'clang-format==18.1.8'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Show clang-format version
        run: clang-format --version
      - name: Check formatting
        run: |
          mapfile -t files < <(git ls-files '*.c' '*.h')
          if [ ${#files[@]} -eq 0 ]; then
              echo "No C sources to check (skeleton — expected)."
              exit 0
          fi
          clang-format --dry-run --Werror "${files[@]}"

  # ================================================================
  # Stage 2 — Reproducibility gate
  # ================================================================
  repro-check:
    name: repro / linux-x86_64
    needs: format-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install clang-20 + lld-20 + nasm + pkg-config + meson + diffoscope
        run: |
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo apt-get install -y --no-install-recommends \
              clang-20 lld-20 llvm-20 nasm pkg-config meson ninja-build diffoscope
      - name: Add Rust gnu target
        run: rustup target add x86_64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Two clean builds, sha256 compare
        run: scripts/repro_check.sh --preset linux-x86_64

  # ================================================================
  # Stage 3 — Per-arch builds (parallel within stage)
  # ================================================================
  build-linux-x86_64:
    name: build / linux-x86_64
    needs: repro-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install clang-20 + lld-20 + nasm + pkg-config + meson
        run: |
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo apt-get install -y --no-install-recommends \
              clang-20 lld-20 llvm-20 nasm pkg-config meson ninja-build
      - name: Add Rust gnu target
        run: rustup target add x86_64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Configure
        run: cmake --preset linux-x86_64
      - name: Build
        run: cmake --build --preset linux-x86_64 --verbose
      - name: Sanity (ELF + version)
        run: |
          file build/linux-x86_64/src/vmavificient
          build/linux-x86_64/src/vmavificient version
      - uses: actions/upload-artifact@v4
        with:
          name: ci-build-linux-x86_64
          path: |
            build/linux-x86_64/CTestTestfile.cmake
            build/linux-x86_64/tests/**
            build/linux-x86_64/src/vmavificient
            !build/linux-x86_64/**/CMakeFiles/**
          retention-days: 1
          if-no-files-found: error

  build-linux-aarch64:
    name: build / linux-aarch64
    needs: repro-check
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install clang-20 + lld-20 + pkg-config + meson
        run: |
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo apt-get install -y --no-install-recommends \
              clang-20 lld-20 llvm-20 pkg-config meson ninja-build
      - name: Add Rust gnu target
        run: rustup target add aarch64-unknown-linux-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Configure
        run: cmake --preset linux-aarch64
      - name: Build
        run: cmake --build --preset linux-aarch64 --verbose
      - name: Sanity (ELF + version)
        run: |
          file build/linux-aarch64/src/vmavificient
          build/linux-aarch64/src/vmavificient version
      - uses: actions/upload-artifact@v4
        with:
          name: ci-build-linux-aarch64
          path: |
            build/linux-aarch64/CTestTestfile.cmake
            build/linux-aarch64/tests/**
            build/linux-aarch64/src/vmavificient
            !build/linux-aarch64/**/CMakeFiles/**
          retention-days: 1
          if-no-files-found: error

  build-macos-arm64:
    name: build / macos-arm64
    needs: repro-check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install meson + nasm via Homebrew (for libvmaf + SVT-AV1)
        run: brew install meson nasm
      - name: Add Rust aarch64-apple-darwin target (host triple)
        run: rustup target add aarch64-apple-darwin
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Configure
        run: cmake --preset macos-arm64
      - name: Build
        run: cmake --build --preset macos-arm64 --verbose
      - name: Sanity (Mach-O + version)
        run: |
          file build/macos-arm64/src/vmavificient
          build/macos-arm64/src/vmavificient version
      - uses: actions/upload-artifact@v4
        with:
          name: ci-build-macos-arm64
          path: |
            build/macos-arm64/CTestTestfile.cmake
            build/macos-arm64/tests/**
            build/macos-arm64/src/vmavificient
            !build/macos-arm64/**/CMakeFiles/**
          retention-days: 1
          if-no-files-found: error

  build-windows-x86_64-mingw:
    name: build / windows-x86_64-mingw
    needs: repro-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install wine + nasm + pkg-config + meson
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              wine nasm pkg-config meson ninja-build
          command -v wine
          wine --version
      - name: Fetch llvm-mingw
        run: |
          dir="$(bash scripts/fetch_llvm_mingw.sh | tail -n 1)"
          echo "${dir}/bin" >> "$GITHUB_PATH"
      - name: Add Rust windows-gnu target
        run: rustup target add x86_64-pc-windows-gnu
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-c
      - name: Point cargo at llvm-mingw's linker (windows-gnu cross)
        run: |
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
          echo "CC_x86_64_pc_windows_gnu=x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
      - name: Configure
        run: cmake --preset windows-x86_64-mingw
      - name: Build
        run: cmake --build --preset windows-x86_64-mingw --verbose
      - name: Sanity (PE)
        run: |
          file build/windows-x86_64-mingw/src/vmavificient.exe
          test -s build/windows-x86_64-mingw/src/vmavificient.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ci-build-windows-x86_64-mingw
          path: |
            build/windows-x86_64-mingw/CTestTestfile.cmake
            build/windows-x86_64-mingw/tests/**
            build/windows-x86_64-mingw/src/vmavificient.exe
            !build/windows-x86_64-mingw/**/CMakeFiles/**
          retention-days: 1
          if-no-files-found: error

  # ================================================================
  # Stage 4 — Per-arch tests (each depends on its build)
  # ================================================================
  test-linux-x86_64:
    name: test / linux-x86_64
    needs: build-linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - uses: actions/download-artifact@v4
        with:
          name: ci-build-linux-x86_64
          path: build/linux-x86_64
      - name: Test
        run: ctest --test-dir build/linux-x86_64 --output-on-failure

  test-linux-aarch64:
    name: test / linux-aarch64
    needs: build-linux-aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - uses: actions/download-artifact@v4
        with:
          name: ci-build-linux-aarch64
          path: build/linux-aarch64
      - name: Test
        run: ctest --test-dir build/linux-aarch64 --output-on-failure

  test-macos-arm64:
    name: test / macos-arm64
    needs: build-macos-arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - uses: actions/download-artifact@v4
        with:
          name: ci-build-macos-arm64
          path: build/macos-arm64
      - name: Test
        run: ctest --test-dir build/macos-arm64 --output-on-failure

  test-windows-x86_64-mingw:
    name: test / windows-x86_64-mingw
    needs: build-windows-x86_64-mingw
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - name: Install wine (test runner is non-Windows host)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends wine
      - uses: actions/download-artifact@v4
        with:
          name: ci-build-windows-x86_64-mingw
          path: build/windows-x86_64-mingw
      - name: Test (under wine)
        env:
          WINEDEBUG: -all
        run: ctest --test-dir build/windows-x86_64-mingw --output-on-failure
